services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hub
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/hub_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://hub:hub_password@postgres:5432/hub
      DEFAULT_TENANT_ID: 11111111-1111-4111-8111-111111111111
      AUTH_JWT_SECRET: replace_with_a_long_random_secret
      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_PASSWORD: change_me
      CORS_ORIGINS: http://localhost:3000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: hub_password
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - neo4j

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_TENANT_ID: 11111111-1111-4111-8111-111111111111
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  neo4j-data:
